<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Yao Yoga Wear</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preload" href="/js/i18n.js" as="script">
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;">

<header class="header">
  <div class="container header-inner">
    <a href="/" class="logo">Yao<span>Yoga</span>Wear</a>
    <nav class="nav" id="mainNav">
      <a href="/" data-i18n="nav.home">Home</a>
      <a href="/products/" data-i18n="nav.products">Products</a>
      <a href="/contact.html" data-i18n="nav.contact">Contact</a>
    </nav>
    <button class="mobile-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
  </div>
</header>
<div class="nav-overlay" id="navOverlay"></div>

<main style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div>
    <h1 style="font-size:4rem;color:#16a34a;margin-bottom:.5rem;">404</h1>
    <p style="font-size:1.25rem;margin-bottom:2rem;color:#555;">Page not found. Let's get you back on track.</p>
    <a href="/" class="btn btn-primary btn-lg">Go to Homepage</a>
  </div>
</main>

<footer class="footer">
  <div class="footer-bottom"><div class="container"><p>&copy; 2026 Yao Yoga Wear</p></div></div>
</footer>

<script>
(function(){
  var t=document.getElementById('navToggle'),n=document.getElementById('mainNav'),o=document.getElementById('navOverlay');
  function c(){n.classList.remove('open');o.classList.remove('open');t.textContent='☰';}
  t.addEventListener('click',function(){var op=n.classList.toggle('open');o.classList.toggle('open',op);t.textContent=op?'✕':'☰';});
  o.addEventListener('click',c);
  n.querySelectorAll('a').forEach(function(a){a.addEventListener('click',c);});
})();
</script>

<!-- Language Switcher -->
<div class="lang-switcher" id="langSwitcher">
  <button class="lang-toggle" onclick="document.getElementById('langSwitcher').classList.toggle('open')" data-i18n="lang.label">EN</button>
  <div class="lang-options">
    <button class="lang-btn" data-lang="en" onclick="window.setLang('en');document.getElementById('langSwitcher').classList.remove('open')">EN</button>
    <button class="lang-btn" data-lang="es" onclick="window.setLang('es');document.getElementById('langSwitcher').classList.remove('open')">ES</button>
    <button class="lang-btn" data-lang="pt" onclick="window.setLang('pt');document.getElementById('langSwitcher').classList.remove('open')">PT</button>
  </div>
</div>

<!-- i18n -->
<script src="/js/i18n.js"></script>
</body>
</html>
